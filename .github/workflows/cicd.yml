name: Kubernetes CI/CD

on:
  push:
    branches: [ main ]

env:
  IMAGE: gauravmishraokok/flask-k8s-app

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt
      - run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u gauravmishraokok --password-stdin

      - name: Build & Push
        run: |
          docker build -t $IMAGE:latest .
          docker push $IMAGE:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployment will be handled locally via Minikube"
